name: yeon-develop

services:
  web:
    image: ${YEON_WEB_IMAGE:-ghcr.io/hyeonjun0527/yeon-web-app:develop}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_AI_CHAT_MODEL: ${OPENAI_AI_CHAT_MODEL:-}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-}
      OPENAI_TRANSCRIPTION_FALLBACK_MODELS: ${OPENAI_TRANSCRIPTION_FALLBACK_MODELS:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      COUNSELING_RECORDS_WORK_DIR: ${COUNSELING_RECORDS_WORK_DIR:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      default:
      edge:
        aliases:
          - yeon-dev-web
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    networks:
      default:
      edge:
        aliases:
          - yeon-dev-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yeon_develop}
      POSTGRES_USER: ${POSTGRES_USER:-yeon_develop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-yeon_develop} -d ${POSTGRES_DB:-yeon_develop}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres-data:

networks:
  edge:
    name: yeon-edge
    external: true
