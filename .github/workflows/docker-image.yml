name: Build, Push, and Deploy Docker Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-image.yml"
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "apps/web/**"
      - "packages/api-contract/**"
      - "packages/config/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/yeon-web-app

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: docker
    runs-on: [self-hosted, linux, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check deploy prerequisites
        run: |
          set -eu
          test -d /srv/yeon
          test -f /srv/yeon/.env
          command -v docker
          docker compose version

      - name: Sync compose file to Raspberry Pi deploy directory
        run: |
          set -eu
          install -m 644 compose.prod.yml /srv/yeon/compose.prod.yml

      - name: Deploy on Raspberry Pi
        env:
          YEON_WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/yeon-web-app:latest
        run: |
          set -eu
          cd /srv/yeon
          docker compose -f compose.prod.yml pull
          docker compose -f compose.prod.yml up -d
