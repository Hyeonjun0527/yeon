name: Build, Push, and Deploy Docker Image

on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/docker-image.yml"
      - "Dockerfile"
      - ".dockerignore"
      - ".env.example"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "compose.prod.yml"
      - "compose.dev.yml"
      - "apps/web/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/yeon-web-app

jobs:
  docker:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_production:
    if: github.ref == 'refs/heads/main'
    needs: docker
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DEPLOY_DIR: /srv/yeon
      COMPOSE_FILE: compose.prod.yml
      IMAGE_TAG: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check deploy prerequisites
        run: |
          set -eu
          install -d "${DEPLOY_DIR}"
          test -f "${DEPLOY_DIR}/.env"
          command -v docker
          docker compose version
          docker network inspect yeon-edge >/dev/null 2>&1 || docker network create yeon-edge

      - name: Sync compose file
        run: |
          set -eu
          install -m 644 "${COMPOSE_FILE}" "${DEPLOY_DIR}/${COMPOSE_FILE}"

      - name: Deploy on Raspberry Pi
        run: |
          set -eu
          owner_lower="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          cd "${DEPLOY_DIR}"
          export YEON_WEB_IMAGE="ghcr.io/${owner_lower}/yeon-web-app:${IMAGE_TAG}"
          docker compose -f "${COMPOSE_FILE}" pull
          docker compose -f "${COMPOSE_FILE}" up -d

  deploy_develop:
    if: github.ref == 'refs/heads/develop'
    needs: docker
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DEPLOY_DIR: /srv/yeon-develop
      COMPOSE_FILE: compose.dev.yml
      IMAGE_TAG: develop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check deploy prerequisites
        run: |
          set -eu
          install -d "${DEPLOY_DIR}"
          test -f "${DEPLOY_DIR}/.env"
          command -v docker
          docker compose version
          docker network inspect yeon-edge >/dev/null 2>&1 || docker network create yeon-edge

      - name: Sync compose file
        run: |
          set -eu
          install -m 644 "${COMPOSE_FILE}" "${DEPLOY_DIR}/${COMPOSE_FILE}"

      - name: Deploy on Raspberry Pi
        run: |
          set -eu
          owner_lower="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          cd "${DEPLOY_DIR}"
          export YEON_WEB_IMAGE="ghcr.io/${owner_lower}/yeon-web-app:${IMAGE_TAG}"
          docker compose -f "${COMPOSE_FILE}" pull
          docker compose -f "${COMPOSE_FILE}" up -d
