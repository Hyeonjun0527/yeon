name: Build, Push, and Deploy Docker Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-image.yml"
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "apps/web/**"
      - "packages/api-contract/**"
      - "packages/config/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/yeon-web

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: docker
    runs-on: ubuntu-latest
    env:
      RPI_HOST: ${{ secrets.RPI_HOST }}
      RPI_PORT: ${{ secrets.RPI_PORT }}
      RPI_USERNAME: ${{ secrets.RPI_USERNAME }}
      RPI_SSH_KEY: ${{ secrets.RPI_SSH_KEY }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}

    steps:
      - name: Check deploy prerequisites
        id: deploy_check
        run: |
          set -eu

          if [ -z "${RPI_HOST}" ] || [ -z "${RPI_USERNAME}" ] || [ -z "${RPI_SSH_KEY}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Raspberry Pi deploy secrets are not configured; skipping deploy."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        if: steps.deploy_check.outputs.ready == 'true'
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$RPI_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${RPI_PORT:-22}" -H "$RPI_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on Raspberry Pi
        if: steps.deploy_check.outputs.ready == 'true'
        run: |
          set -eu

          if [ -n "${GHCR_PULL_USERNAME}" ] && [ -n "${GHCR_PULL_TOKEN}" ]; then
            ssh -p "${RPI_PORT:-22}" "${RPI_USERNAME}@${RPI_HOST}" \
              "printf '%s\n' '${GHCR_PULL_TOKEN}' | docker login ghcr.io -u '${GHCR_PULL_USERNAME}' --password-stdin"
          fi

          ssh -p "${RPI_PORT:-22}" "${RPI_USERNAME}@${RPI_HOST}" \
            "set -eu; cd /srv/yeon && docker compose -f compose.prod.yml pull && docker compose -f compose.prod.yml up -d"
