name: Build, Push, and Deploy Docker Image

on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/docker-image.yml"
      - "Dockerfile"
      - ".dockerignore"
      - ".env.example"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "compose.prod.yml"
      - "compose.dev.yml"
      - "apps/web/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: yeon-web-app

jobs:
  build_amd64:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: Build amd64 image by digest
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          build-args: NODE_MEMORY=4096
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=yeon-web-amd64
          cache-to: type=gha,mode=max,scope=yeon-web-amd64

      - name: Export amd64 digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload amd64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build_arm64:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: [self-hosted, Linux, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: 디스크·이미지 정리 (빌드 전)
        run: |
          docker image prune -f --filter "until=48h"
          docker builder prune -f --filter "until=48h"

      - name: Build arm64 image by digest
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          build-args: NODE_MEMORY=3072
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=yeon-web-arm64
          cache-to: type=gha,mode=min,scope=yeon-web-arm64

      - name: Export arm64 digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish_manifest:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    needs:
      - build_amd64
      - build_arm64
    runs-on: ubuntu-latest

    steps:
      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          mapfile -t digest_files < <(printf '%s\n' * | sort)

          if [ "${#digest_files[@]}" -ne 2 ]; then
            echo "digest 파일 개수가 예상과 다릅니다: ${#digest_files[@]}개"
            if [ "${#digest_files[@]}" -gt 0 ]; then
              printf ' - %s\n' "${digest_files[@]}"
            fi
            exit 1
          fi

          refs=()
          for digest in "${digest_files[@]}"; do
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "digest 파일 이름 형식이 잘못되었습니다: $digest"
              exit 1
            fi

            ref="${IMAGE}@sha256:${digest}"
            refs+=("$ref")

            for i in 1 2 3; do
              docker buildx imagetools inspect "$ref" >/dev/null 2>&1 && break
              if [ "$i" -eq 3 ]; then
                echo "source digest 확인 실패: $ref"
                exit 1
              fi
              echo "source digest 확인 실패 (${i}/3), 10초 후 재시도..."
              sleep 10
            done
          done

          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "manifest 태그가 비어 있습니다."
            exit 1
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(-t "$tag")
          done

          for i in 1 2 3; do
            docker buildx imagetools create "${tag_args[@]}" "${refs[@]}" && break
            if [ "$i" -eq 3 ]; then
              echo "manifest 생성 실패: 3회 시도 후 중단합니다."
              exit 1
            fi
            wait_seconds=$((i * 20))
            echo "manifest 생성 실패 (${i}/3), ${wait_seconds}초 후 재시도..."
            sleep "$wait_seconds"
          done

      - name: Inspect published image
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          first_tag="$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          # GHCR manifest 전파 지연 대응: 최대 3회 재시도
          for i in 1 2 3; do
            docker buildx imagetools inspect "$first_tag" && break
            [ "$i" -eq 3 ] && exit 1
            echo "inspect 실패 (${i}/3), 20초 후 재시도..."
            sleep 20
          done

  deploy_production:
    if: github.ref == 'refs/heads/main'
    needs: publish_manifest
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DEPLOY_DIR: /srv/yeon
      COMPOSE_FILE: compose.prod.yml
      IMAGE_TAG: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check deploy prerequisites
        run: |
          set -eu
          install -d "${DEPLOY_DIR}"
          test -f "${DEPLOY_DIR}/.env"
          command -v docker
          docker compose version
          docker network inspect yeon-edge >/dev/null 2>&1 || docker network create yeon-edge
          docker network inspect yeon-db-edge >/dev/null 2>&1 || docker network create yeon-db-edge

      - name: Sync compose file
        run: |
          set -eu
          install -m 644 "${COMPOSE_FILE}" "${DEPLOY_DIR}/${COMPOSE_FILE}"

      - name: Deploy on Raspberry Pi
        run: |
          set -eu
          owner_lower="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          cd "${DEPLOY_DIR}"
          export YEON_WEB_IMAGE="ghcr.io/${owner_lower}/yeon-web-app:${IMAGE_TAG}"
          # Pi 네트워크 대응: pull 실패 시 최대 3회 재시도
          for i in 1 2 3; do
            docker compose -f "${COMPOSE_FILE}" pull && break
            [ "$i" -eq 3 ] && exit 1
            echo "pull 실패 (${i}/3), 30초 후 재시도..."
            sleep 30
          done
          # --force-recreate 제거: 변경된 서비스(web)만 재시작, DB는 불필요하게 재시작하지 않음
          # --wait: 모든 서비스가 healthy 상태가 될 때까지 대기 후 반환
          docker compose -f "${COMPOSE_FILE}" up -d --wait

      - name: Run DB migrations
        run: |
          set -eu
          DEPLOY_DIR="${DEPLOY_DIR}" COMPOSE_FILE="${COMPOSE_FILE}" bash scripts/migrate.sh

  deploy_develop:
    if: github.ref == 'refs/heads/develop'
    needs: publish_manifest
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DEPLOY_DIR: /srv/yeon-develop
      COMPOSE_FILE: compose.dev.yml
      IMAGE_TAG: develop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check deploy prerequisites
        run: |
          set -eu
          install -d "${DEPLOY_DIR}"
          test -f "${DEPLOY_DIR}/.env"
          command -v docker
          docker compose version
          docker network inspect yeon-edge >/dev/null 2>&1 || docker network create yeon-edge
          docker network inspect yeon-db-edge >/dev/null 2>&1 || docker network create yeon-db-edge

      - name: Sync compose file
        run: |
          set -eu
          install -m 644 "${COMPOSE_FILE}" "${DEPLOY_DIR}/${COMPOSE_FILE}"

      - name: Deploy on Raspberry Pi
        run: |
          set -eu
          owner_lower="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          cd "${DEPLOY_DIR}"
          export YEON_WEB_IMAGE="ghcr.io/${owner_lower}/yeon-web-app:${IMAGE_TAG}"
          # Pi 네트워크 대응: pull 실패 시 최대 3회 재시도
          for i in 1 2 3; do
            docker compose -f "${COMPOSE_FILE}" pull && break
            [ "$i" -eq 3 ] && exit 1
            echo "pull 실패 (${i}/3), 30초 후 재시도..."
            sleep 30
          done
          # --force-recreate 제거: 변경된 서비스(web)만 재시작, DB는 불필요하게 재시작하지 않음
          # --wait: 모든 서비스가 healthy 상태가 될 때까지 대기 후 반환
          docker compose -f "${COMPOSE_FILE}" up -d --wait

      - name: Run DB migrations
        run: |
          set -eu
          DEPLOY_DIR="${DEPLOY_DIR}" COMPOSE_FILE="${COMPOSE_FILE}" bash scripts/migrate.sh
