name: Build, Push, and Deploy Docker Image

on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/docker-image.yml"
      - "Dockerfile"
      - ".dockerignore"
      - ".env.example"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "compose.prod.yml"
      - "compose.dev.yml"
      - "apps/web/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/yeon-web-app

jobs:
  docker:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_production:
    if: github.ref == 'refs/heads/main'
    needs: docker
    runs-on: ubuntu-latest
    env:
      PROD_RPI_HOST: ${{ secrets.PROD_RPI_HOST }}
      PROD_RPI_PORT: ${{ secrets.PROD_RPI_PORT }}
      PROD_RPI_USERNAME: ${{ secrets.PROD_RPI_USERNAME }}
      PROD_RPI_SSH_KEY: ${{ secrets.PROD_RPI_SSH_KEY }}
      PROD_GHCR_PULL_USERNAME: ${{ secrets.PROD_GHCR_PULL_USERNAME }}
      PROD_GHCR_PULL_TOKEN: ${{ secrets.PROD_GHCR_PULL_TOKEN }}
      RPI_HOST: ${{ secrets.RPI_HOST }}
      RPI_PORT: ${{ secrets.RPI_PORT }}
      RPI_USERNAME: ${{ secrets.RPI_USERNAME }}
      RPI_SSH_KEY: ${{ secrets.RPI_SSH_KEY }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      DEPLOY_DIR: /srv/yeon
      COMPOSE_FILE: compose.prod.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy configuration
        id: deploy_check
        run: |
          set -eu

          deploy_host="${PROD_RPI_HOST:-${RPI_HOST:-}}"
          deploy_port="${PROD_RPI_PORT:-${RPI_PORT:-22}}"
          deploy_username="${PROD_RPI_USERNAME:-${RPI_USERNAME:-}}"
          deploy_ssh_key="${PROD_RPI_SSH_KEY:-${RPI_SSH_KEY:-}}"
          ghcr_pull_username="${PROD_GHCR_PULL_USERNAME:-${GHCR_PULL_USERNAME:-}}"
          ghcr_pull_token="${PROD_GHCR_PULL_TOKEN:-${GHCR_PULL_TOKEN:-}}"

          if [ -z "$deploy_host" ] || [ -z "$deploy_username" ] || [ -z "$deploy_ssh_key" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Production deploy secrets are not configured; skipping deploy."
            exit 0
          fi

          {
            echo "DEPLOY_HOST=$deploy_host"
            echo "DEPLOY_PORT=$deploy_port"
            echo "DEPLOY_USERNAME=$deploy_username"
            echo "DEPLOY_GHCR_PULL_USERNAME=$ghcr_pull_username"
            echo "DEPLOY_GHCR_PULL_TOKEN=$ghcr_pull_token"
          } >> "$GITHUB_ENV"

          {
            echo "DEPLOY_SSH_KEY<<EOF"
            printf '%s\n' "$deploy_ssh_key"
            echo "EOF"
          } >> "$GITHUB_ENV"

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        if: steps.deploy_check.outputs.ready == 'true'
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync compose file
        if: steps.deploy_check.outputs.ready == 'true'
        run: |
          set -eu
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USERNAME}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_DIR}'"
          scp -P "${DEPLOY_PORT}" "${COMPOSE_FILE}" \
            "${DEPLOY_USERNAME}@${DEPLOY_HOST}:${DEPLOY_DIR}/${COMPOSE_FILE}"

      - name: Deploy on Raspberry Pi
        if: steps.deploy_check.outputs.ready == 'true'
        run: |
          set -eu

          if [ -n "${DEPLOY_GHCR_PULL_USERNAME}" ] && [ -n "${DEPLOY_GHCR_PULL_TOKEN}" ]; then
            printf '%s\n' "${DEPLOY_GHCR_PULL_TOKEN}" | \
              ssh -p "${DEPLOY_PORT}" "${DEPLOY_USERNAME}@${DEPLOY_HOST}" \
                "docker login ghcr.io -u '${DEPLOY_GHCR_PULL_USERNAME}' --password-stdin"
          fi

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USERNAME}@${DEPLOY_HOST}" \
            "set -eu; cd '${DEPLOY_DIR}' && docker compose -f '${COMPOSE_FILE}' pull && docker compose -f '${COMPOSE_FILE}' up -d"

  deploy_develop:
    if: github.ref == 'refs/heads/develop'
    needs: docker
    runs-on: ubuntu-latest
    env:
      DEV_RPI_HOST: ${{ secrets.DEV_RPI_HOST }}
      DEV_RPI_PORT: ${{ secrets.DEV_RPI_PORT }}
      DEV_RPI_USERNAME: ${{ secrets.DEV_RPI_USERNAME }}
      DEV_RPI_SSH_KEY: ${{ secrets.DEV_RPI_SSH_KEY }}
      DEV_GHCR_PULL_USERNAME: ${{ secrets.DEV_GHCR_PULL_USERNAME }}
      DEV_GHCR_PULL_TOKEN: ${{ secrets.DEV_GHCR_PULL_TOKEN }}
      DEPLOY_DIR: /srv/yeon-develop
      COMPOSE_FILE: compose.dev.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy configuration
        id: deploy_check
        run: |
          set -eu

          deploy_host="${DEV_RPI_HOST:-}"
          deploy_port="${DEV_RPI_PORT:-22}"
          deploy_username="${DEV_RPI_USERNAME:-}"
          deploy_ssh_key="${DEV_RPI_SSH_KEY:-}"
          ghcr_pull_username="${DEV_GHCR_PULL_USERNAME:-}"
          ghcr_pull_token="${DEV_GHCR_PULL_TOKEN:-}"

          if [ -z "$deploy_host" ] || [ -z "$deploy_username" ] || [ -z "$deploy_ssh_key" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Develop deploy secrets are not configured; skipping deploy."
            exit 0
          fi

          {
            echo "DEPLOY_HOST=$deploy_host"
            echo "DEPLOY_PORT=$deploy_port"
            echo "DEPLOY_USERNAME=$deploy_username"
            echo "DEPLOY_GHCR_PULL_USERNAME=$ghcr_pull_username"
            echo "DEPLOY_GHCR_PULL_TOKEN=$ghcr_pull_token"
          } >> "$GITHUB_ENV"

          {
            echo "DEPLOY_SSH_KEY<<EOF"
            printf '%s\n' "$deploy_ssh_key"
            echo "EOF"
          } >> "$GITHUB_ENV"

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        if: steps.deploy_check.outputs.ready == 'true'
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync compose file
        if: steps.deploy_check.outputs.ready == 'true'
        run: |
          set -eu
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USERNAME}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_DIR}'"
          scp -P "${DEPLOY_PORT}" "${COMPOSE_FILE}" \
            "${DEPLOY_USERNAME}@${DEPLOY_HOST}:${DEPLOY_DIR}/${COMPOSE_FILE}"

      - name: Deploy on Raspberry Pi
        if: steps.deploy_check.outputs.ready == 'true'
        run: |
          set -eu

          if [ -n "${DEPLOY_GHCR_PULL_USERNAME}" ] && [ -n "${DEPLOY_GHCR_PULL_TOKEN}" ]; then
            printf '%s\n' "${DEPLOY_GHCR_PULL_TOKEN}" | \
              ssh -p "${DEPLOY_PORT}" "${DEPLOY_USERNAME}@${DEPLOY_HOST}" \
                "docker login ghcr.io -u '${DEPLOY_GHCR_PULL_USERNAME}' --password-stdin"
          fi

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USERNAME}@${DEPLOY_HOST}" \
            "set -eu; cd '${DEPLOY_DIR}' && docker compose -f '${COMPOSE_FILE}' pull && docker compose -f '${COMPOSE_FILE}' up -d"
