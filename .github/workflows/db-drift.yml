name: DB Schema Drift Check

on:
  pull_request:
    paths:
      - "apps/web/src/server/db/schema/**"
      - "apps/web/src/server/db/migrations/**"
      - "apps/web/drizzle.config.ts"
      - "apps/web/scripts/check-schema-drift.mjs"
      - "apps/web/package.json"
      - "package.json"

jobs:
  check:
    name: check schema vs migration drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check schema drift
        run: pnpm --filter @yeon/web db:check:drift
